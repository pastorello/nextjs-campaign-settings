services:
  postgres:
    image: postgres:latest
    container_name: my-database-container
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - my-database-network

  adminer:
    image: adminer:latest
    container_name: my-admin-panel-container
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: my-database-container
    networks:
      - my-database-network

networks:
  my-database-network:
    driver: bridge

volumes:
  postgres-data:
